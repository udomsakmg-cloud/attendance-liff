<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px 15px; }
    button {
      width: 100%; padding: 16px; margin: 8px 0; font-size: 17px;
      border: none; border-radius: 10px; color: white;
    }
    #checkin { background: #06C755; }
    #checkout { background: #FF5555; }
    #photoInput { display: none; }
    #status { margin-top: 15px; font-size: 14px; white-space: pre-line; }
    #preview { max-width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <h2>📍 ลงเวลางาน</h2>
  <input type="file" id="photoInput" accept="image/*" capture="user">
  <img id="preview">
  <button id="checkin">✅ เข้างาน</button>
  <button id="checkout">🔴 เลิกงาน</button>
  <div id="status">กำลังเตรียมระบบ...</div>

  <script>
    const LIFF_ID = '2010782987-4mjGpChs';
    const SCRIPT_URL = '
https://script.google.com/macros/s/AKfycbyHN6wvKffQtD6dqchcP1T2g_7_veIEt7APiz3YXyXo9cwFuk7XSoAK2opcWjuxQlJ3/exec';

    let pendingType = null;

    liff.init({ liffId: LIFF_ID }).then(() => {
      document.getElementById('status').innerText = 'พร้อมใช้งาน กดปุ่มเพื่อลงเวลา';
    }).catch(err => {
      document.getElementById('status').innerText = 'เกิดข้อผิดพลาด: ' + err;
    });

    document.getElementById('checkin').onclick = () => startCheckIn('เข้างาน');
    document.getElementById('checkout').onclick = () => startCheckIn('เลิกงาน');

    function startCheckIn(type) {
      pendingType = type;
      document.getElementById('photoInput').click(); // เปิดกล้องถ่ายรูปก่อน
    }

    document.getElementById('photoInput').onchange = function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function() {
        const imageBase64 = reader.result;
        document.getElementById('preview').src = imageBase64;
        document.getElementById('preview').style.display = 'block';
        getLocationAndSubmit(imageBase64);
      };
      reader.readAsDataURL(file);
    };

    function getLocationAndSubmit(imageBase64) {
      document.getElementById('status').innerText = 'กำลังดึงตำแหน่ง GPS...';

      navigator.geolocation.getCurrentPosition(async (pos) => {
        const profile = await liff.getProfile();

        const payload = {
          name: profile.displayName,
          type: pendingType,
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          image: imageBase64
        };

        document.getElementById('status').innerText = 'กำลังบันทึก...';

        try {
          const res = await fetch(S
https://script.google.com/macros/s/AKfycbyHN6wvKffQtD6dqchcP1T2g_7_veIEt7APiz3YXyXo9cwFuk7XSoAK2opcWjuxQlJ3/exec, {
            method: 'POST',
            body: JSON.stringify(payload)
          });
          const result = await res.json();

          document.getElementById('status').innerText =
            result.success ? '✅ ' + result.message : '❌ ' + result.message;
        } catch (err) {
          document.getElementById('status').innerText = '❌ ส่งข้อมูลไม่สำเร็จ: ' + err;
        }
      }, () => {
        document.getElementById('status').innerText = 'ไม่สามารถดึงตำแหน่งได้ กรุณาเปิด GPS';
      }, { enableHighAccuracy: true, timeout: 10000 });
    }
  </script>
</body>
</html>
